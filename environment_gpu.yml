name: rasd-gpu
channels:
  - pytorch
  - nvidia
  - huggingface
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core ML — CUDA 12.1
  - pytorch::pytorch=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Data & modelling
  - numpy
  - pandas
  - scipy

  # Visualisation
  - matplotlib
  - seaborn

  # Utilities
  - tqdm
  - pyyaml
  - jsonlines

  - pip:
    - transformers>=4.36.0
    - datasets>=2.16.0
    - tokenizers>=0.15.0
    - accelerate>=0.25.0
    - wandb>=0.16.0
    - flash-attn>=2.4.0
    - deepspeed>=0.12.0
    - ninja
    - packaging